<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Steam 启航</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e17">
    <link rel="manifest" href="manifest.json">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #060b14;
            --bg-card: rgba(14, 20, 35, 0.7);
            --border-subtle: rgba(255,255,255,0.06);
            --text-primary: #e8edf5;
            --text-secondary: rgba(255,255,255,0.4);
            --text-tertiary: rgba(255,255,255,0.2);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --gold: #c9a455;
            --gold-glow: rgba(201, 164, 85, 0.3);
            --success: #22c55e;
            --success-glow: rgba(34, 197, 94, 0.3);
            --danger: #ef4444;
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Inter', sans-serif;
            background: var(--bg-deep);
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
            color: var(--text-primary);
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(59,130,246,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 90%, rgba(201,164,85,0.06) 0%, transparent 50%),
                radial-gradient(ellipse 50% 50% at 50% 40%, rgba(59,130,246,0.04) 0%, transparent 50%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        /* Subtle grid pattern */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative; z-index: 1;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            padding: 28px 20px;
        }

        /* Logo area */
        .logo-area {
            position: relative;
            margin-bottom: 20px;
        }
        .logo-ring {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(37,99,235,0.1));
            border: 1.5px solid rgba(59,130,246,0.3);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .logo-ring::after {
            content: '';
            position: absolute; inset: -6px;
            border-radius: 50%;
            border: 1px solid rgba(59,130,246,0.08);
            animation: logoOrbit 12s linear infinite;
        }
        @keyframes logoOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .logo-icon {
            width: 42px; height: 42px;
            opacity: 0.95;
            filter: drop-shadow(0 0 12px rgba(59,130,246,0.4));
        }
        .logo-glow {
            position: absolute;
            width: 60px; height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.15), transparent);
            filter: blur(16px);
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 0.3; }
        }

        .app-title {
            font-size: 1.25rem; font-weight: 700;
            letter-spacing: 5px;
            margin-bottom: 2px;
            background: linear-gradient(180deg, #e8edf5 0%, rgba(232,237,245,0.6) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .app-subtitle {
            font-size: 0.65rem; font-weight: 500;
            letter-spacing: 8px;
            color: rgba(255,255,255,0.18);
            margin-bottom: 36px;
            text-transform: uppercase;
        }

        /* Status indicator dot */
        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            position: relative;
        }
        .status-dot.online {
            background: var(--success);
            box-shadow: 0 0 8px var(--success-glow), 0 0 20px var(--success-glow);
            animation: dotPulse 2s ease-in-out infinite;
        }
        .status-dot.connecting {
            background: #eab308;
            box-shadow: 0 0 8px rgba(234,179,8,0.4);
            animation: dotFlash 0.8s ease-in-out infinite;
        }
        .status-dot.offline {
            background: var(--danger);
            box-shadow: 0 0 6px rgba(239,68,68,0.3);
        }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 8px var(--success-glow), 0 0 20px var(--success-glow); }
            50% { box-shadow: 0 0 4px var(--success-glow), 0 0 10px var(--success-glow); }
        }
        @keyframes dotFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Card */
        .card {
            width: 100%; max-width: 360px;
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 32px 24px 28px;
            box-shadow:
                0 8px 32px rgba(0,0,0,0.4),
                0 1px 0 rgba(255,255,255,0.04) inset;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }
        .card::after {
            content: '';
            position: absolute; bottom: -40px; right: -40px;
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 1px solid rgba(59,130,246,0.04);
            pointer-events: none;
        }

        .screen-label {
            font-size: 0.7rem; font-weight: 500;
            color: var(--text-tertiary);
            letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 20px; text-align: center;
        }

        .status {
            text-align: center; font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 12px 0; min-height: 24px;
            line-height: 1.6;
            transition: color 0.3s, opacity 0.3s;
            font-weight: 450;
        }

        /* Buttons */
        .btn {
            width: 100%; padding: 15px 20px; border: none; border-radius: var(--radius-md);
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            letter-spacing: 3px; transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            outline: none; -webkit-tap-highlight-color: transparent;
            position: relative; overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
            border-radius: inherit;
        }
        .btn:active { transform: scale(0.96); }

        .btn-allow {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: #fff;
            box-shadow: 0 4px 20px rgba(37,99,235,0.35);
            font-size: 1rem;
        }
        .btn-allow:hover { box-shadow: 0 6px 28px rgba(37,99,235,0.45); }

        .btn-deny {
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.45);
            border: 1px solid rgba(255,255,255,0.06);
            margin-top: 10px;
        }
        .btn-deny:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
        }

        .btn-reset {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
            color: #fff;
            box-shadow: 0 4px 20px rgba(37,99,235,0.3);
            margin-top: 20px;
        }

        .screen { display: none; width: 100%; }
        .screen.active { display: block; }

        /* Spinner */
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        .footer-area {
            margin-top: 32px;
            text-align: center;
        }
        .footer-line {
            width: 24px; height: 2px;
            background: rgba(255,255,255,0.06);
            margin: 0 auto 12px;
            border-radius: 1px;
        }
        .footer-text {
            font-size: 0.65rem; color: rgba(255,255,255,0.12);
            letter-spacing: 3px; font-weight: 500;
        }

        /* Action icon animations */
        .action-icon {
            width: 48px; height: 48px;
            margin: 0 auto 16px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            transition: all 0.4s ease;
        }
        .action-icon.waiting {
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.15);
        }
        .action-icon.confirm {
            background: rgba(34,197,94,0.08);
            border: 1px solid rgba(34,197,94,0.2);
            animation: iconBounce 0.6s ease;
        }
        @keyframes iconBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-glow"></div>
            <div class="logo-ring">
                <svg class="logo-icon" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#60a5fa"/>
                            <stop offset="100%" stop-color="#2563eb"/>
                        </linearGradient>
                    </defs>
                    <circle cx="100" cy="100" r="88" fill="url(#lg2)" opacity="0.9"/>
                    <rect x="50" y="44" width="34" height="112" rx="3" fill="#fff" opacity="0.92"/>
                    <polygon points="118,44 154,60 154,156 118,156" fill="#fff" opacity="0.78"/>
                    <rect x="46" y="38" width="112" height="11" rx="2.5" fill="#fff"/>
                    <rect x="46" y="150" width="72" height="9" rx="2.5" fill="#fff"/>
                    <circle cx="100" cy="29" r="4.5" fill="#fff" opacity="0.6"/>
                </svg>
            </div>
        </div>

        <div class="app-title">STEAM 启航</div>
        <div class="app-subtitle">Access Controller</div>

        <div class="card">
            <!-- Screen 1: Waiting -->
            <div class="screen active" id="screenWait">
                <div class="action-icon waiting" id="waitIcon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(59,130,246,0.5)" stroke-width="1.5">
                        <path d="M9 12l2 2 4-4"/>
                        <circle cx="12" cy="12" r="9"/>
                    </svg>
                </div>
                <p class="screen-label">等待授权请求</p>
                <p class="status" id="statusWait">
                    <span class="spinner"></span>正在初始化...
                </p>
            </div>

            <!-- Screen 2: Confirm -->
            <div class="screen" id="screenConfirm">
                <div class="action-icon confirm" id="confirmIcon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(34,197,94,0.6)" stroke-width="1.5">
                        <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                        <path d="M12 8v4M12 16h.01"/>
                    </svg>
                </div>
                <p class="screen-label">有人正在请求访问</p>
                <button class="btn btn-allow" id="btnAllow">
                    <span style="display:inline-flex;align-items:center;gap:8px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                        允 许 访 问
                    </span>
                </button>
                <button class="btn btn-deny" id="btnDeny">拒 绝</button>
                <p class="status" id="statusConfirm"></p>
            </div>

            <!-- Screen 3: Result -->
            <div class="screen" id="screenResult">
                <p class="status" id="statusResult" style="font-size:0.95rem;margin:20px 0"></p>
                <button class="btn btn-reset" id="btnReset">返回就绪</button>
            </div>
        </div>

        <div class="footer-area">
            <div class="footer-line"></div>
            <div class="footer-text">DESIGNED BY OUYANG</div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        (function() {
            const APP_PEER_ID = 'steam-ship-app';
            let peer = null;
            let currentConn = null;

            const screenWait = document.getElementById('screenWait');
            const screenConfirm = document.getElementById('screenConfirm');
            const screenResult = document.getElementById('screenResult');
            const statusWait = document.getElementById('statusWait');
            const statusConfirm = document.getElementById('statusConfirm');
            const statusResult = document.getElementById('statusResult');
            const btnAllow = document.getElementById('btnAllow');
            const btnDeny = document.getElementById('btnDeny');
            const btnReset = document.getElementById('btnReset');

            function showScreen(name) {
                [screenWait, screenConfirm, screenResult].forEach(function(s) {
                    s.classList.remove('active');
                });
                document.getElementById('screen' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
            }

            function setStatusWait(msg, state) {
                statusWait.innerHTML = msg;
                if (state === 'online') {
                    statusWait.innerHTML = '<span class="status-dot online"></span>信令已就绪，等待连接...';
                } else if (state === 'connecting') {
                    statusWait.innerHTML = '<span class="status-dot connecting"></span>' + msg;
                } else if (state === 'offline') {
                    statusWait.innerHTML = '<span class="status-dot offline"></span>' + msg;
                } else {
                    statusWait.innerHTML = msg;
                }
            }

            function tryInit() {
                peer = new Peer(APP_PEER_ID);
                let retried = false;

                peer.on('open', function(id) {
                    setStatusWait('', 'online');
                });

                peer.on('connection', function(conn) {
                    currentConn = conn;
                    showScreen('confirm');
                    statusConfirm.textContent = '';
                    // Animate confirm icon
                    var icon = document.getElementById('confirmIcon');
                    icon.classList.remove('confirm');
                    void icon.offsetWidth;
                    icon.classList.add('confirm');

                    conn.on('close', function() {
                        if (currentConn === conn) {
                            currentConn = null;
                            showScreen('wait');
                            setStatusWait('', 'online');
                        }
                    });

                    conn.on('error', function() {
                        if (currentConn === conn) {
                            currentConn = null;
                            showScreen('wait');
                            setStatusWait('连接异常，等待重新连接...', 'offline');
                        }
                    });
                });

                peer.on('error', function(err) {
                    console.error('App Peer error:', err);
                    if (!retried) {
                        retried = true;
                        peer.destroy();
                        statusWait.innerHTML = '<span class="spinner"></span>正在重连信令服务...';
                        setTimeout(tryInit, 2000);
                        return;
                    }
                    setStatusWait('信令服务连接失败，请重启 App', 'offline');
                });

                peer.on('disconnected', function() {
                    if (peer && !peer.destroyed) {
                        statusWait.innerHTML = '<span class="spinner"></span>信令断开，自动重连中...';
                        peer.reconnect();
                    }
                });
            }

            btnAllow.addEventListener('click', function() {
                if (!currentConn) return;
                currentConn.send('allow');
                statusConfirm.innerHTML = '<span class="status-dot online" style="display:inline-block;margin-right:6px"></span>已授权';
                btnAllow.style.opacity = '0.5';
                btnAllow.disabled = true;
                btnDeny.style.opacity = '0.3';
                btnDeny.disabled = true;
                setTimeout(function() {
                    showScreen('result');
                    statusResult.innerHTML = '<span style="display:block;font-size:1.1rem;color:#22c55e;margin-bottom:8px">授权成功</span><span style="color:rgba(255,255,255,0.3);font-size:0.8rem">网站已解锁</span>';
                    cleanupConn();
                }, 500);
            });

            btnDeny.addEventListener('click', function() {
                if (!currentConn) return;
                currentConn.send('deny');
                statusConfirm.innerHTML = '<span class="status-dot offline" style="display:inline-block;margin-right:6px"></span>已拒绝';
                btnDeny.style.opacity = '0.5';
                btnDeny.disabled = true;
                btnAllow.style.opacity = '0.3';
                btnAllow.disabled = true;
                setTimeout(function() {
                    showScreen('result');
                    statusResult.innerHTML = '<span style="display:block;font-size:1.1rem;color:#ef4444;margin-bottom:8px">已拒绝</span><span style="color:rgba(255,255,255,0.3);font-size:0.8rem">此次访问请求被拒绝</span>';
                    cleanupConn();
                }, 500);
            });

            btnReset.addEventListener('click', function() {
                cleanupConn();
                showScreen('wait');
                setStatusWait('', 'online');
            });

            function cleanupConn() {
                if (currentConn) { try { currentConn.close(); } catch(e) {} currentConn = null; }
            }

            tryInit();
        })();
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').catch(function() {});
            });
        }
    </script>
</body>
</html>
